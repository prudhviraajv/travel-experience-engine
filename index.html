<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover, plan, and experience your next great adventure.">
    <title>Wanderlust - Travel Plan & Experience Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <nav class="navbar">
        <div class="logo">Wanderlust.</div>
        <div class="nav-links">
            <a href="#destinations">Destinations</a>
            <a href="#experiences">Experiences</a>
            <button class="btn-primary" id="themeToggle">Toggle Theme</button>
        </div>
    </nav>

    <main class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">Craft Your Perfect <span class="highlight">Escape</span></h1>
            <p class="hero-subtitle">Our AI-driven engine curates personalized travel experiences based on your unique style, budget, and dreams.</p>
            
            <div class="search-container">
                <input type="text" id="destinationInput" placeholder="Where do you want to go? e.g. Kyoto, Japan" autocomplete="off">
                <button class="btn-primary" id="searchBtn">Plan Journey</button>
            </div>
            
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p>Generating your bespoke itinerary...</p>
            </div>
        </div>
    </main>

    <section class="results-section hidden" id="resultsSection">
        <h2 class="section-heading">Curated Experiences for <span id="displayLocation"></span></h2>
        
        <div class="experience-grid" id="experienceGrid">
            <!-- Cards will be populated by JS -->
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
